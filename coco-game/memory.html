<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMORY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stile-score.css"> 
    <style>
        :root { 
            --bg-color: #cab692; 
            --accent: #e67e22; 
        }

        body.page-memory { 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            overflow: hidden; 
            margin: 0; 
            padding: 0; 
            transition: background-color 0.15s ease; 
            position: relative; 
            box-sizing: border-box;
            font-family: sans-serif;
        }

        #score-display {
            margin-top: clamp(15px, 3vh, 40px);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(15px, 3vh, 40px);
            margin: auto 0;
            width: 100%;
        }

        .hen-row { 
            display: flex; 
            gap: clamp(10px, 2vw, 35px); 
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1800px;
            padding: 0 15px;
            box-sizing: border-box;
        }

        /* Struttura della gallina con l'indicatore del tasto */
        .hen-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .hen { 
            width: clamp(120px, 22vw, 380px); 
            height: auto; 
            transition: transform 0.1s; 
            user-select: none; 
            image-rendering: pixelated; 
            cursor: pointer; 
        }
        .hen img { width: 100%; display: block; height: auto; }
        .hen .open-frame { display: none; }
        .hen.active .closed-frame { display: none; }
        .hen.active .open-frame { display: block; }
        .hen:active, .hen.keyboard-active { transform: scale(0.95); }

        /* Etichetta visiva del tasto da premere */
        .key-hint {
            background-color: #000;
            color: #fff;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            border: 2px solid #fff;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            user-select: none;
        }

        #start-btn {
            width: clamp(100px, 14vw, 160px);
            height: clamp(45px, 6vh, 70px);
            font-size: clamp(0.8rem, 1.3vw, 1.4rem);
            background-color: #27ae60; color: white;
            border: 4px solid #000; border-radius: 0;
            box-shadow: 0 8px 0 #1e8449; 
            transition: all 0.1s; 
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #1e8449; }
        #start-btn:disabled { background-color: #bdc3c7; box-shadow: 0 6px 0 #95a5a6; cursor: not-allowed; border-color: #7f8c8d; }
        
        .back-arrow { position: absolute; bottom: 20px; left: 20px; }

        .game-over-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.85); 
            display: none; justify-content: center; align-items: center;
            z-index: 999; backdrop-filter: blur(2px); 
        }

        .game-over-box {
            background-color: #2c3e50; border: 6px solid #e74c3c;
            padding: 30px; text-align: center; box-shadow: 0 10px 0 #000;
            max-width: 500px; width: 85%;
        }

        .game-over-box h2 {
            color: #e74c3c; font-size: clamp(2rem, 6vw, 3.5rem);
            margin: 0 0 25px 0; text-shadow: 3px 3px #000;
            letter-spacing: 2px; font-weight: bold;
        }

        .game-over-menu { display: flex; justify-content: space-around; gap: 15px; margin-top: 20px; }

        .go-btn {
            background-color: #34495e; border: 4px solid #000; color: #fff;
            padding: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            width: 30%; transition: transform 0.1s; text-decoration: none;
        }
        .go-btn:active { transform: scale(0.95); background-color: #1a252f; }
        .go-btn img { width: 50px; height: 50px; image-rendering: pixelated; margin-bottom: 8px; object-fit: contain; }
        .go-btn span { font-size: clamp(0.7rem, 1.5vw, 1rem); font-weight: bold; text-transform: uppercase; }

        @media (max-height: 650px) {
            #score-display { margin-top: 10px; }
            .game-layout { gap: 10px; }
            .hen-row { gap: 12px; }
            .hen { width: clamp(80px, 15vw, 220px); }
            .hen-container { gap: 4px; }
            .key-hint { padding: 2px 8px; font-size: 0.9rem; }
            #start-btn { height: 45px; }
        }
    </style>
</head>
<body class="page-memory">
    
    <div id="score-display">LIVELLO: 0</div>

    <div class="game-layout">
        <div class="hen-row">
            <div class="hen-container">
                <div class="hen" data-id="1" onclick="handleHenClick(1)" style="--hen-color: rgba(255, 77, 77, 0.45);"> 
                    <img src="img/cocoframe8.png" class="closed-frame" alt="Gallina A">
                    <img src="img/cocoframe7.png" class="open-frame">
                </div>
                
            </div>
            
            <div class="hen-container">
                <div class="hen" data-id="2" onclick="handleHenClick(2)" style="--hen-color: rgba(236, 243, 33, 0.45);"> 
                    <img src="img/cocoframe4.png" class="closed-frame" alt="Gallina D">
                    <img src="img/cocoframe3.png" class="open-frame">
                </div>
                
            </div>

            <div class="hen-container">
                <div class="hen" data-id="3" onclick="handleHenClick(3)" style="--hen-color: rgba(79, 255, 59, 0.45);"> 
                    <img src="img/cocoframe6.png" class="closed-frame" alt="Gallina W">
                    <img src="img/cocoframe5.png" class="open-frame">
                </div>
                
            </div>

            <div class="hen-container">
                <div class="hen" data-id="4" onclick="handleHenClick(4)" style="--hen-color: rgba(76, 116, 175, 0.45);"> 
                    <img src="img/cocoframe1.png" class="closed-frame" alt="Gallina S">
                    <img src="img/cocoframe2.png" class="open-frame">
                </div>
               
            </div>
        </div>

        <button id="start-btn">INIZIA</button>
    </div>
    
    <a href="index.html"><img src="img/freccia.png" alt="Indietro" class="back-arrow"></a>

    <div id="game-over-screen" class="game-over-overlay">
        <div class="game-over-box">
            <h2>GAME OVER</h2>
            <div class="game-over-menu">
                <a href="index.html" class="go-btn">
                    <img src="img/pio.3.png" alt="Home Icon">
                    <span>HOME</span>
                </a>
                <a href="rank.html" class="go-btn">
                    <img src="img/pio.2.png" alt="Rank Icon">
                    <span>RANK</span>
                </a>
                <div class="go-btn" id="replay-btn" onclick="replayGame()">
                    <img src="img/pio.1.png" alt="Replay Icon">
                    <span>REPLAY</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let gameSequence = [], playerSequence = [], isPlayingSequence = false;
        let isGameOver = false;
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');
        const bodyElement = document.body;
        const gameOverScreen = document.getElementById('game-over-screen');

        // Mappatura dei tasti fisici agli ID delle galline
        const keyMap = {
            'a': 1, 'A': 1,
            'd': 2, 'D': 2,
            'w': 3, 'W': 3,
            's': 4, 'S': 4
        };

        startBtn.addEventListener('click', startGame);

        // Ascolto degli input della tastiera
        window.addEventListener('keydown', function(e) {
            // Se la schermata di game over è attiva, premi Invio o Spazio per fare il Replay
            if (isGameOver) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    replayGame();
                }
                return;
            }

            // Se il gioco non è ancora iniziato, premi Invio o Spazio per iniziare
            if (gameSequence.length === 0 && !isPlayingSequence) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }

            // Controlla se il tasto premuto corrisponde a una gallina
            if (keyMap[e.key] !== undefined) {
                e.preventDefault();
                const id = keyMap[e.key];
                
                // Effettua il click simulato solo se la sequenza non è in riproduzione
                if (!isPlayingSequence && gameSequence.length > 0) {
                    const hen = document.querySelector(`.hen[data-id="${id}"]`);
                    hen.classList.add('keyboard-active');
                    handleHenClick(id);
                    setTimeout(() => {
                        hen.classList.remove('keyboard-active');
                    }, 150);
                }
            }
        });

        function startGame() {
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            gameSequence = [];
            startBtn.disabled = true;
            nextRound();
        }
        
        function replayGame() {
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            startGame();
        }

        function nextRound() {
            playerSequence = [];
            scoreDisplay.innerText = "LIVELLO: " + (gameSequence.length + 1);
            gameSequence.push(Math.floor(Math.random() * 4) + 1);
            setTimeout(playSequence, 800);
        }

        async function playSequence() {
            isPlayingSequence = true;
            startBtn.innerText = "...";
            for (let id of gameSequence) {
                await flashHen(id);
                await new Promise(r => setTimeout(r, 250));
            }
            isPlayingSequence = false;
            startBtn.innerText = "TOCCA!";
        }
        
        function flashHen(id) {
            return new Promise(resolve => {
                const hen = document.querySelector(`.hen[data-id="${id}"]`);
                const color = hen.style.getPropertyValue('--hen-color');
                
                hen.classList.add('active');
                bodyElement.style.backgroundColor = color; 
                
                setTimeout(() => { 
                    hen.classList.remove('active'); 
                    bodyElement.style.backgroundColor = ''; 
                    resolve(); 
                }, 500);
            });
        }
        
        function handleHenClick(id) {
            if (isPlayingSequence || gameSequence.length === 0) return;
            const hen = document.querySelector(`.hen[data-id="${id}"]`);
            const color = hen.style.getPropertyValue('--hen-color');
            
            hen.classList.add('active');
            bodyElement.style.backgroundColor = color; 
            
            setTimeout(() => {
                hen.classList.remove('active');
                bodyElement.style.backgroundColor = ''; 
            }, 150);

            playerSequence.push(id);
            const idx = playerSequence.length - 1;
            
            if (playerSequence[idx] !== gameSequence[idx]) {
                startBtn.innerText = "ERR!";
                salvaPunteggio(gameSequence.length - 1);
                
                startBtn.disabled = false;
                gameSequence = [];
                
                setTimeout(() => {
                    isGameOver = true;
                    gameOverScreen.style.display = 'flex';
                    startBtn.innerText = "RIPROVA";
                }, 500);
                return;
            }
            if (playerSequence.length === gameSequence.length) {
                startBtn.innerText = "OK!";
                setTimeout(nextRound, 1000);
            }
        }
        
        function salvaPunteggio(livello) {
            const nomeGiocatore = (localStorage.getItem("playerName") || "GUEST").toUpperCase();
            let classifica = JSON.parse(localStorage.getItem("classifica_gioco_5")) || [];
            const esistente = classifica.find(e => e.nome === nomeGiocatore);
            if (esistente) {
                if (livello <= esistente.punti) return;
                esistente.punti = livello;
            } else {
                classifica.push({ nome: nomeGiocatore, punti: livello });
            }
            classifica.sort((a, b) => b.punti - a.punti);
            classifica = classifica.slice(0, 50);
            localStorage.setItem("classifica_gioco_5", JSON.stringify(classifica));
        }
    </script>
</body>
</html>

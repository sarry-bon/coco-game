<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYAN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stile-score.css"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body.page-nyan {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            background: #003366 !important;
            cursor: none;
        }

        .page-nyan #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: #003366;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Schermata Trasparente Scura di Game Over */
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85); 
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(2px); 
            cursor: default; 
        }

        /* Riquadro centrale */
        .game-over-box {
            background-color: #2c3e50;
            border: 6px solid #e74c3c;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 0 #000;
            max-width: 500px;
            width: 85%;
        }

        .game-over-box h2 {
            color: #e74c3c;
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin: 0 0 25px 0;
            text-shadow: 3px 3px #000;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Contenitore dei 3 pulsanti */
        .game-over-menu {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 20px;
        }

        /* Stile singoli pulsanti */
        .go-btn {
            background-color: #34495e;
            border: 4px solid #000;
            color: #fff;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 30%;
            transition: transform 0.1s;
            text-decoration: none;
        }

        .go-btn:active {
            transform: scale(0.95);
            background-color: #1a252f;
        }

        .go-btn img {
            width: 50px;
            height: 50px;
            image-rendering: pixelated; 
            margin-bottom: 8px;
            object-fit: contain;
        }

        .go-btn span {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="page-nyan">

<canvas id="gameCanvas"></canvas>

<div id="game-over-screen" class="game-over-overlay">
    <div class="game-over-box">
        <h2>GAME OVER</h2>
        <div class="game-over-menu">
            <a href="index.html" class="go-btn">
                <img src="img/pio.3.png" alt="Home Icon">
                <span>HOME</span>
            </a>
            <a href="rank.html" class="go-btn">
                <img src="img/pio.2.png" alt="Rank Icon">
                <span>RANK</span>
            </a>
            <div class="go-btn" onclick="resetGame()">
                <img src="img/pio.1.png" alt="Replay Icon">
                <span>REPLAY</span>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const gameOverScreen = document.getElementById("game-over-screen");

// --- GESTIONE AUDIO AGGIORNATA ---
const bgMusic = new Audio("audio/nyan.mp3");
bgMusic.loop = true; 
bgMusic.volume = 0.4; 

const sndAnguria = new Audio("audio/anguria.mp3");
sndAnguria.volume = 0.6;

const sndBanana = new Audio("audio/ew.mp3");
sndBanana.volume = 1.0; 

let musicStarted = false;
function startMusic() {
    if (!musicStarted && !gameOver) {
        bgMusic.play().catch(err => console.log("In attesa di interazione per l'audio"));
        musicStarted = true;
    }
}
// ---------------------------------

function W(pct) { return canvas.width  * pct; }
function H(pct) { return canvas.height * pct; }

let score = 0;
let gameOver = false;
let gameFrames = 0;
let punteggioSalvato = false; 

const coco = {
    x: 0,
    y: 0,
    scale: 6,
    w: 0,
    h: 0,
    currentFrame: 0,
    frameTimer: 0,
    frameSpeed: 6,
    init() {
        this.x = 0;
        if (frames.length > 0) {
            this.y = (canvas.height / 2) - (this.h / 2);
        }
    }
};

const starFrames = [];
const stars = [];
const TOTAL_STARS = 5;
const STAR_SCALE = 4;
const NUM_STARS = 15;

const anguriaFrames = []; 
const bananaFrames = [];  
const FRUIT_SCALE = 5;    

const dots = {
    items: [],
    spawnTimer: 0,
    get radius() { return H(0.025); },
    
    // La velocità aumenta ogni 200 punti
    get speed() { 
        let baseSpeed = W(0.005);
        let speedMultiplier = 1 + Math.floor(score / 200) * 0.25; // +25% ogni 200 punti
        
        if (score >= 1000) {
            speedMultiplier = 2.5; 
        }
        return baseSpeed * speedMultiplier;
    },

    update() {
        this.spawnTimer++;
        
        let spawnInterval = 60; // Standard sotto i 400 punti
        
        if (score >= 400 && score < 1000) {
            // A 400 punti scende subito a 40 frame (più frutti), poi cala progressivamente fino a 20 frame
            spawnInterval = Math.max(20, 40 - Math.floor((score - 400) * 0.04));
        } else if (score >= 1000) {
            // Muro impossibile finale
            spawnInterval = 5; 
        }

        if (this.spawnTimer >= spawnInterval) {
            this.spawnTimer = 0;
            
            let bananaChance = 0.4;
            if (score >= 400) bananaChance = 0.55; // Più banane dai 400 in su
            if (score >= 700) bananaChance = 0.70;

            const type = Math.random() > bananaChance ? "yellow" : "red";
            this.items.push({
                x: canvas.width + this.radius,
                y: Math.random() * (canvas.height - this.radius * 2) + this.radius,
                type: type,
                currentFrame: 0,
                frameTimer: 0,
                frameSpeed: 8 
            });
        }

        for (let i = 0; i < this.items.length; i++) {
            const dot = this.items[i];
            dot.x -= this.speed;

            dot.frameTimer++;
            if (dot.frameTimer >= dot.frameSpeed) {
                dot.currentFrame = (dot.currentFrame + 1) % 4; 
                dot.frameTimer = 0;
            }

            const gBox = {
                left: coco.x,
                right: coco.x + coco.w,
                top: coco.y,
                bottom: coco.y + coco.h
            };

            const headWidth = coco.w * 0.25;
            const headBox = {
                left: coco.x + coco.w - headWidth,
                right: coco.x + coco.w,
                top: coco.y,
                bottom: coco.y + coco.h
            };

            const colpitoCorpo = (dot.x + this.radius > gBox.left && dot.x - this.radius < gBox.right &&
                                  dot.y + this.radius > gBox.top && dot.y - this.radius < gBox.bottom);

            const colpitoTesta = (dot.x + this.radius > headBox.left && dot.x - this.radius < headBox.right &&
                                  dot.y + this.radius > headBox.top && dot.y - this.radius < headBox.bottom);

            if (dot.type === "yellow" && colpitoCorpo) {
                score += 30;
                sndAnguria.currentTime = 0;
                sndAnguria.play();
                this.items.splice(i--, 1);
                continue;
            }

            if (dot.type === "red" && colpitoTesta) {
                bgMusic.pause();
                sndBanana.currentTime = 0;
                sndBanana.play();
                gameOver = true;
            }

            if (dot.x + this.radius < 0) {
                this.items.splice(i--, 1);
            }
        }
    },

    draw() {
        this.items.forEach(dot => {
            const imgList = dot.type === "yellow" ? anguriaFrames : bananaFrames;
            const img = imgList[dot.currentFrame];

            if (img) {
                const imgW = img.width * FRUIT_SCALE;
                const imgH = img.height * FRUIT_SCALE;
                ctx.drawImage(img, Math.floor(dot.x - imgW / 2), Math.floor(dot.y - imgH / 2), imgW, imgH);
            } else {
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = dot.type === "yellow" ? "#FFCC00" : "#FF3333";
                ctx.fill();
                ctx.closePath();
            }
        });
    },

    reset() {
        this.items = [];
        this.spawnTimer = 0;
    }
};

const frames = [];
let loaded = 0;
const TOTAL = 5;

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
    generateStars();
}

function generateStars() {
    stars.length = 0;
    for(let i = 0; i < NUM_STARS; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            currentFrame: Math.floor(Math.random() * TOTAL_STARS),
            frameTimer: 0,
            frameSpeed: 6 + Math.floor(Math.random() * 4)
        });
    }
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

for(let i = 1; i <= 5; i++){
    const img = new Image();
    img.src = `img/nyan-star${i}.png`;
    img.onload = () => { starFrames.push(img); };
}

for(let i = 1; i <= 4; i++){
    const img = new Image();
    img.src = `img/nyan.anguria${i}.png`;
    img.onload = () => { anguriaFrames.push(img); };
}

for(let i = 1; i <= 4; i++){
    const img = new Image();
    img.src = `img/nyan-banana${i}.png`;
    img.onload = () => { bananaFrames.push(img); };
}

for(let i = 2; i <= 6; i++){
    const img = new Image();
    img.src = `img/nyan-coco${i}.png`;
    img.onload = () => {
        frames.push(img);
        loaded++;

        if(loaded === TOTAL){
            const base = frames[0];
            const baseW = base.width || 100;
            const baseH = base.height || 100;

            coco.w = baseW * coco.scale;
            coco.h = baseH * coco.scale;

            coco.init();
            generateStars();
            resizeCanvas();

            requestAnimationFrame(loop);
        }
    };
}

window.addEventListener("mousemove", (e)=>{
    startMusic(); 
    if (gameOver) return;
    coco.y = e.clientY - (coco.h / 2);
    if(coco.y < 0) coco.y = 0;
    if(coco.y > canvas.height - coco.h){
        coco.y = canvas.height - coco.h;
    }
});

function drawScore() {
    const compStyles = window.getComputedStyle(document.documentElement);
    const fontName = compStyles.getPropertyValue('--score-font').trim() || 'sans-serif';
    const scoreColor = compStyles.getPropertyValue('--score-color').trim() || '#ffffff';
    const shadowColor = compStyles.getPropertyValue('--score-shadow').trim() || '#000000';
    
    let fontSize = Math.max(24, Math.min(window.innerWidth * 0.04, 40));
    
    ctx.save();
    ctx.font = `900 ${fontSize}px ${fontName}`;
    ctx.textBaseline = "top";
    
    ctx.fillStyle = shadowColor;
    ctx.fillText("SCORE: " + score, 20 + 3, 20 + 3);
    
    ctx.fillStyle = scoreColor;
    ctx.fillText("SCORE: " + score, 20, 20);
    ctx.restore();
}

function showGameOverScreen() {
    document.body.style.cursor = "default"; 
    gameOverScreen.style.display = "flex";
}

function salvaPunteggio() {
    const nome = (localStorage.getItem("playerName") || "GUEST").toUpperCase();
    const punti = parseInt(score);
    let classifica = JSON.parse(localStorage.getItem("classifica_gioco_2")) || [];
    const esistente = classifica.find(e => e.nome === nome);
    if (esistente) { if (punti <= esistente.punti) return; esistente.punti = punti; }
    else classifica.push({ nome, punti });
    classifica.sort((a, b) => b.punti - a.punti);
    classifica = classifica.slice(0, 50);
    localStorage.setItem("classifica_gioco_2", JSON.stringify(classifica));
}

function resetGame() {
    document.body.style.cursor = "none"; 
    gameOverScreen.style.display = "none";
    coco.init();
    dots.reset();
    score = 0;
    gameFrames = 0;
    gameOver = false;
    punteggioSalvato = false;
    
    bgMusic.currentTime = 0;
    bgMusic.play().catch(err => console.log(err));
    
    loop();
}

document.addEventListener("keydown", e => {
    if (e.code === "Space" && gameOver) resetGame();
});

function loop(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.imageSmoothingEnabled = false;

    ctx.fillStyle = "#003366";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if (!gameOver) {
        update();
    }

    stars.forEach(star => {
        const starImg = starFrames[star.currentFrame];
        if(starImg) {
            ctx.drawImage(starImg, Math.floor(star.x), Math.floor(star.y), starImg.width * STAR_SCALE, starImg.height * STAR_SCALE);
        }
    });

    dots.draw();

    const img = frames[coco.currentFrame];
    if(img) {
        ctx.drawImage(img, Math.floor(coco.x), Math.floor(coco.y), coco.w, coco.h);
    }

    drawScore();

    if (gameOver) {
        showGameOverScreen();
        if (!punteggioSalvato) {
            salvaPunteggio();
            punteggioSalvato = true;
        }
    } else {
        gameFrames++;
        requestAnimationFrame(loop);
    }
}

function update(){
    coco.frameTimer++;
    if(coco.frameTimer >= coco.frameSpeed){
        coco.currentFrame = (coco.currentFrame + 1) % frames.length;
        coco.frameTimer = 0;
    }

    stars.forEach(star => {
        star.frameTimer++;
        if(star.frameTimer >= star.frameSpeed){
            star.currentFrame = (star.currentFrame + 1) % TOTAL_STARS;
            star.frameTimer = 0;
        }
    });

    dots.update();
}
</script>
<a href="play.html"> 
    <img src="img/freccia.png" alt="Indietro" class="back-arrow" style="transform: rotate(0deg); width: 45px; height: 45px; position: absolute; bottom: 30px; left: 40px; z-index: 10; opacity: 0.8; image-rendering: pixelated;"> 
</a>
</body>
</html>

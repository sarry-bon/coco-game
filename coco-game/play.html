<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Selezione Gioco</title>
    <style>
        @font-face { font-family: 'KarmaticArcade'; src: url('font/ka1.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'KarmaticArcade', sans-serif; }
        body {
            background-color: #63c1ff; color: #000; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden;
        }
        .header-play {
            font-size: clamp(30px, 5vw, 60px); font-weight: 900;
            letter-spacing: clamp(4px, 1vw, 10px); margin-bottom: clamp(15px, 3vh, 40px);
            text-transform: uppercase; text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .game-selection { display: flex; flex-direction: column; align-items: center; gap: clamp(10px, 2vh, 30px); width: 100%; }
        .row-4 { display: flex; justify-content: center; gap: clamp(8px, 1.5vw, 20px); width: 100%; }
        .bottom-section { display: flex; align-items: center; justify-content: center; gap: clamp(15px, 3vw, 40px); width: 100%; }
        .card-link { transition: transform 0.2s; cursor: pointer; text-decoration: none; }
        .card-img { width: clamp(100px, 16vw, 300px); image-rendering: pixelated; display: block; }
        .card-link:hover { transform: scale(1.05); }
        .play-main-btn { width: clamp(80px, 12vw, 250px); cursor: pointer; image-rendering: pixelated; transition: transform 0.1s; }
        .play-main-btn:hover { transform: scale(1.1) rotate(-2deg); }
        .back-arrow { position: fixed; bottom: 25px; left: 25px; width: clamp(80px, 10vw, 160px); image-rendering: pixelated; cursor: pointer; transition: transform 0.1s; }
        .back-arrow:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="header-play">PLAY</div>
    <div class="game-selection">
        <div class="row-4">
            <a href="custom.html?gioco=1" class="card-link"><img src="img/coco.png" alt="cocoman" class="card-img"></a>
            <a href="custom.html?gioco=2" class="card-link"><img src="img/nayancoco.png" alt="nayancoco" class="card-img"></a>
            <a href="custom.html?gioco=3" class="card-link"><img src="img/cocoshuter.png" alt="cocoshuter" class="card-img"></a>
            <a href="custom.html?gioco=4" class="card-link"><img src="img/flappycoco.png" alt="flappycoco" class="card-img"></a>
        </div>
        <div class="bottom-section">
            <a href="custom.html?gioco=5" class="card-link"><img src="img/memorycoco.png" alt="memorycoco" class="card-img"></a>
            <img src="img/suscoco.png" alt="Coco" class="play-main-btn" id="centralPlay" onclick="vaiARandom()">
            <a href="custom.html?gioco=6" class="card-link"><img src="img/cocoman.png" alt="G6" class="card-img"></a>
        </div>
    </div>
    <a href="index.html"><img src="img/freccia.png" alt="Torna indietro" class="back-arrow"></a>
    <script>
        function vaiARandom() {
            const gioco = Math.floor(Math.random() * 6) + 1;
            window.location.href = 'custom.html?gioco=' + gioco;
        }
    </script>
</body>
</html>

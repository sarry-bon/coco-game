<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.page-play {
            /* Colore base: Viola Lavanda Opaco */
            background-color: #84659b; 
            
            /* Sfondo a colonne con la sfumatura orizzontale (chiaro al centro dello schermo, scuro sopra e sotto) */
            background-image: 
                linear-gradient(to bottom, rgba(0, 0, 0, 0.22) 0%, rgba(255, 255, 255, 0.25) 50%, rgba(0, 0, 0, 0.25) 100%),
                linear-gradient(90deg, 
                    #9678af 0%, #9678af 50%,  /* Prima colonna (Viola pastello più chiaro) */
                    #84659b 50%, #84659b 100% /* Seconda colonna (Variante coordinata opaca) */
                );
            
            /* Spessore delle colonne coordinato con le altre pagine (90px a colonna) */
            background-size: 100% 100%, 180px 100%;

            color: #000; 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            overflow: hidden;
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; /* Reset base per consistenza */
            box-sizing: border-box;
        }

        .game-selection { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: clamp(8px, 2vh, 25px); 
            width: 100%; 
            max-width: 1200px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        
        .row-4 { 
            display: flex; 
            justify-content: center; 
            gap: clamp(6px, 1.5vw, 20px); 
            width: 100%; 
        }
        
        .bottom-section { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: clamp(10px, 3vw, 40px); 
            width: 100%; 
        }

        .card-link { transition: transform 0.2s; text-decoration: none; display: inline-block; }
        /* Modificato il max del clamp da 300px a 240px per evitare che le immagini esplodano in altezza su F11 */
        .card-img { width: clamp(80px, 15vw, 240px); image-rendering: pixelated; display: block; height: auto; }
        .card-link:hover { transform: scale(1.05); }

        /* Ridotto leggermente il max del bottone centrale per proporzione */
        .play-main-btn { width: clamp(70px, 11vw, 200px); image-rendering: pixelated; transition: transform 0.1s; cursor: pointer; height: auto; }
        .play-main-btn:hover { transform: scale(1.1) rotate(-2deg); }

        /* --- MEDIA QUERIES PER SCHERMI BASSI / F11 MODALITÀ LANDSCAPE --- */

        /* Se l'altezza dello schermo scende sotto i 650px (classico scenario F11 su laptop o schermi compatti) */
        @media (max-height: 650px) {
            .game-selection {
                gap: 8px; /* Rimpicciolisce lo spazio verticale tra le righe */
            }
            .card-img {
                width: clamp(60px, 12vw, 160px); /* Riduce le card per non farle uscire dallo schermo */
            }
            .play-main-btn {
                width: clamp(55px, 9vw, 130px); /* Riduce il bottone centrale di conseguenza */
            }
        }

        /* Controllo ultra-stretto in altezza per i casi estremi (es. monitor molto larghi ma bassi in F11) */
        @media (max-height: 480px) {
            .game-selection {
                gap: 5px;
            }
            .card-img {
                width: clamp(50px, 10vw, 110px);
            }
            .play-main-btn {
                width: clamp(45px, 8vw, 90px);
            }
        }
    </style>
</head>

<body class="page-play">

    <h1 class="main-game-title">PLAY</h1>

    <div class="game-selection">
        <div class="row-4">
            <a href="custom.html?gioco=1" class="card-link"><img src="img/coco.png" alt="cocoman" class="card-img"></a>
            <a href="custom.html?gioco=2" class="card-link"><img src="img/nayancoco.png" alt="nayancoco" class="card-img"></a>
            <a href="custom.html?gioco=3" class="card-link"><img src="img/doom.png" alt="doom" class="card-img"></a>
            <a href="custom.html?gioco=4" class="card-link"><img src="img/flappycoco.png" alt="flappycoco" class="card-img"></a>
        </div>
        <div class="bottom-section">
            <a href="custom.html?gioco=5" class="card-link"><img src="img/memorycoco.png" alt="memorycoco" class="card-img"></a>
            <img src="img/suscoco.png" alt="Coco" class="play-main-btn" id="centralPlay" onclick="vaiARandom()">
            <a href="custom.html?gioco=6" class="card-link"><img src="img/cocoman.png" alt="G6" class="card-img"></a>
        </div>
    </div>
    <a href="index.html"><img src="img/freccia.png" alt="Torna indietro" class="back-arrow"></a>
    <script>
        function vaiARandom() {
            const gioco = Math.floor(Math.random() * 6) + 1;
            window.location.href = 'custom.html?gioco=' + gioco;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Coco</title>
    <style>
        @font-face { font-family: 'KarmaticArcade'; src: url('font/ka1.ttf') format('truetype'); }
        body { margin: 0; padding: 0; background-color: #70c5ce; overflow: hidden; font-family: 'KarmaticArcade', sans-serif; }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Tutte le misure sono percentuali del canvas — fisica identica su qualsiasi schermo
        function W(pct) { return canvas.width  * pct; }
        function H(pct) { return canvas.height * pct; }

        const birdImg1 = new Image(); birdImg1.src = 'img/coco1.png';
        const birdImg2 = new Image(); birdImg2.src = 'img/coco2.png';
        const eggImg1  = new Image(); eggImg1.src  = 'img/uovo1.png';
        const eggImg2  = new Image(); eggImg2.src  = 'img/uovo2.png';
        const eggImg3  = new Image(); eggImg3.src  = 'img/uovo3.png';
        const pipeTopImg = new Image(); pipeTopImg.src = 'img/tubo_su.png';

        let frames = 0, score = 0, pipeCount = 0, gameOver = false;

       const bird = {
            get x()       { return W(0.10); },
            get width()   { return W(0.12); },
            get height()  { return H(0.20); },
            get gravity() { return H(0.0005); },
            get jumpPow() { return -H(0.015); },
            y: 0,
            velocity: 0,
            init() { this.y = canvas.height / 2 - this.height / 2; this.velocity = 0; },
            draw() {
                const img = (Math.floor(frames / 8) % 2 === 0) ? birdImg1 : birdImg2;
                if (img.complete && img.naturalWidth > 0)
                    ctx.drawImage(img, this.x, this.y, this.width, this.height);
                else { ctx.fillStyle = "yellow"; ctx.fillRect(this.x, this.y, this.width, this.height); }
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                if (this.y + this.height >= canvas.height || this.y <= 0) gameOver = true;
            },
            jump() { this.velocity = this.jumpPow; }
        };

        const prizes = {
            items: [],
            get width()  { return W(0.08); },
            get height() { return H(0.20); },
            draw() {
                const eggImgs = [eggImg1, eggImg2, eggImg3];
                const curEgg = eggImgs[Math.floor(frames / 6) % 3];
                this.items.forEach(egg => {
                    if (curEgg.complete && curEgg.naturalWidth > 0)
                        ctx.drawImage(curEgg, egg.x, egg.y + Math.sin(frames / 10) * H(0.02), this.width, this.height);
                });
            },
            update() {
                const speed = W(0.004);
                for (let i = 0; i < this.items.length; i++) {
                    const egg = this.items[i];
                    egg.x -= speed;
                    if (bird.x < egg.x + this.width && bird.x + bird.width > egg.x &&
                        bird.y < egg.y + this.height && bird.y + bird.height > egg.y) {
                        score += 1000; this.items.splice(i--, 1); continue;
                    }
                    if (egg.x + this.width < 0) this.items.splice(i--, 1);
                }
            }
        };

        const pipes = {
            items: [],
            get width() { return W(0.10); },
            get gap()   { return H(0.42); },
            get speed() { return W(0.004); },

            draw() {
                this.items.forEach(p => {
                    if (!pipeTopImg.complete || pipeTopImg.naturalWidth === 0) return;
                    const ratio = pipeTopImg.height / pipeTopImg.width;
                    const h = this.width * ratio;
                    ctx.drawImage(pipeTopImg, p.x, p.y - h, this.width, h);
                    ctx.save();
                    ctx.translate(p.x + this.width / 2, p.y + this.gap + h / 2);
                    ctx.rotate(Math.PI);
                    ctx.drawImage(pipeTopImg, -this.width / 2, -h / 2, this.width, h);
                    ctx.restore();
                });
            },
            update() {
                if (frames % 160 === 0) {
                    pipeCount++;
                    const minY = H(0.20);
                    const maxY = canvas.height - this.gap - H(0.20);
                    this.items.push({ x: canvas.width, y: Math.random() * (maxY - minY) + minY, passed: false });
                    if (pipeCount % 10 === 0)
                        prizes.items.push({ x: canvas.width + W(0.30), y: canvas.height / 2 - prizes.height / 2 });
                }
                for (let i = 0; i < this.items.length; i++) {
                    const p = this.items[i];
                    p.x -= this.speed;
                    if (bird.x + bird.width * 0.7 > p.x && bird.x + bird.width * 0.2 < p.x + this.width &&
                        (bird.y + bird.height * 0.2 < p.y || bird.y + bird.height * 0.8 > p.y + this.gap))
                        gameOver = true;
                    if (p.x + this.width < bird.x && !p.passed) { score += 10; p.passed = true; }
                    if (p.x + this.width < 0) this.items.splice(i--, 1);
                }
            },
            reset() { this.items = []; prizes.items = []; pipeCount = 0; }
        };

        function drawScore() {
            const fs = Math.round(H(0.06));
            ctx.font = `${fs}px 'KarmaticArcade'`;
            ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = fs * 0.1;
            ctx.strokeText("SCORE: " + score, W(0.03), H(0.10));
            ctx.fillText("SCORE: " + score, W(0.03), H(0.10));
        }

        function drawGameOver() {
            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white"; ctx.textAlign = "center";
            ctx.font = `${Math.round(H(0.12))}px 'KarmaticArcade'`;
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            ctx.font = `${Math.round(H(0.05))}px 'KarmaticArcade'`;
            ctx.fillText("PREMI SPAZIO", canvas.width / 2, canvas.height / 2 + H(0.12));
            ctx.textAlign = "left";
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false;

            if (!gameOver) { bird.update(); pipes.update(); prizes.update(); }
            pipes.draw(); prizes.draw(); bird.draw(); drawScore();

            if (gameOver) {
                drawGameOver();
                if (!window.salvato) { salvaPunteggio(); window.salvato = true; }
            } else {
                frames++;
                window.salvato = false;
                requestAnimationFrame(loop);
            }
        }

        function salvaPunteggio() {
            const nome = (localStorage.getItem("playerName") || "GUEST").toUpperCase();
            const punti = parseInt(score);
            let classifica = JSON.parse(localStorage.getItem("classifica_gioco_4")) || [];
            const esistente = classifica.find(e => e.nome === nome);
            if (esistente) { if (punti <= esistente.punti) return; esistente.punti = punti; }
            else classifica.push({ nome, punti });
            classifica.sort((a, b) => b.punti - a.punti);
            classifica = classifica.slice(0, 50);
            localStorage.setItem("classifica_gioco_4", JSON.stringify(classifica));
        }

        function resetGame() {
            bird.init(); pipes.reset();
            score = 0; frames = 0; gameOver = false;
            loop();
        }

        document.addEventListener("keydown", e => {
            if (e.code === "Space") { if (gameOver) resetGame(); else bird.jump(); }
        });
        window.addEventListener("mousedown", () => {
            if (gameOver) resetGame(); else bird.jump();
        });

        bird.init();
        loop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings</title>
    <style>
        @font-face { font-family: 'KarmaticArcade'; src: url('font/ka1.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'KarmaticArcade', sans-serif; }
        body {
            background-color: #e4ad71; color: #000;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }
        #classifica-titolo {
            font-size: clamp(16px, 2.5vw, 32px); margin-bottom: clamp(10px, 2vh, 20px);
            text-transform: uppercase; font-weight: 900; letter-spacing: 2px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1); text-align: center;
        }
        .rank-layout {
            display: flex; align-items: center; justify-content: space-between;
            width: 95%; max-width: 1800px;
        }
        .side-menu { display: flex; flex-direction: column; gap: clamp(10px, 2vh, 23px); padding: 0 clamp(5px, 1vw, 20px); }
        .game-btn { width: clamp(80px, 14vw, 260px); cursor: pointer; image-rendering: pixelated; transition: transform 0.1s; }
        .game-btn:hover { transform: scale(1.05); }
        .main-container { display: flex; flex-direction: column; align-items: center; gap: clamp(15px, 3vh, 40px); flex-grow: 1; }
        .table-container {
            width: clamp(300px, 50vw, 850px); background-color: #ffd8a1;
            border: 4px solid #000; image-rendering: pixelated;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 3px solid #000; padding: clamp(5px, 1vh, 12px) 10px; text-align: center; font-size: clamp(11px, 1.5vw, 22px); }
        th { background-color: #ffb640; font-size: clamp(12px, 1.6vw, 24px); }
        .nav-controls { display: flex; gap: clamp(60px, 10vw, 160px); }
        .nav-btn { width: clamp(35px, 4vw, 70px); cursor: pointer; image-rendering: pixelated; transition: 0.2s; }
        .nav-btn:hover { transform: scale(1.05); }
        .back-arrow { position: fixed; bottom: 15px; left: 25px; width: clamp(60px, 7vw, 100px); image-rendering: pixelated; transition: transform 0.1s; }
        .back-arrow:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="classifica-titolo">CARICAMENTO...</div>
    <div class="rank-layout">
        <div class="side-menu">
            <img src="img/coco.png" alt="G1" class="game-btn" onclick="cambiaGioco(1)">
            <img src="img/nayancoco.png" alt="G2" class="game-btn" onclick="cambiaGioco(2)">
            <img src="img/cocoshuter.png" alt="G3" class="game-btn" onclick="cambiaGioco(3)">
        </div>
        <div class="main-container">
            <div class="table-container">
                <table>
                    <thead><tr><th>POS</th><th>NOME</th><th>PUNTI</th></tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
            <div class="nav-controls">
                <img src="img/frecciasu.png" alt="SU" class="nav-btn" onclick="cambiaPagina(-1)">
                <img src="img/frecciagiu.png" alt="GIU" class="nav-btn" onclick="cambiaPagina(1)">
            </div>
        </div>
        <div class="side-menu">
            <img src="img/flappycoco.png" alt="G4" class="game-btn" onclick="cambiaGioco(4)">
            <img src="img/memorycoco.png" alt="G5" class="game-btn" onclick="cambiaGioco(5)">
            <img src="img/cocoman.png" alt="G6" class="game-btn" onclick="cambiaGioco(6)">
        </div>
    </div>
    <a href="index.html"><img src="img/freccia.png" alt="Indietro" class="back-arrow"></a>
    <script>
        let giocoAttuale = 1;
        let paginaAttuale = 0;
        const nomiGiochi = { 1: "COCOMAN", 2: "NAYAN COCO", 3: "COCO SHOOTER", 4: "FLAPPY COCO", 5: "MEMORY COCO", 6: "PIO PIO PARTY" };
        function aggiornaTabella() {
            const body = document.getElementById('rank-body');
            const titolo = document.getElementById('classifica-titolo');
            body.innerHTML = "";
            titolo.innerText = "CLASSIFICA " + nomiGiochi[giocoAttuale];
            let dati = JSON.parse(localStorage.getItem("classifica_gioco_" + giocoAttuale)) || [];
            const inizio = paginaAttuale * 10;
            for (let i = inizio; i < inizio + 10; i++) {
                const nome = dati[i] ? dati[i].nome : "---";
                const punti = dati[i] ? dati[i].punti : 0;
                body.innerHTML += `<tr><td>${i + 1}</td><td>${nome}</td><td>${punti}</td></tr>`;
            }
        }
        function cambiaGioco(id) { giocoAttuale = id; paginaAttuale = 0; aggiornaTabella(); }
        function cambiaPagina(dir) {
            paginaAttuale += dir;
            if (paginaAttuale < 0) paginaAttuale = 0;
            if (paginaAttuale > 2) paginaAttuale = 2;
            aggiornaTabella();
        }
        aggiornaTabella();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Game</title>
    <style>
        /* 1. DEFINIZIONE DEL FONT PERSONALIZZATO */
        @font-face {
            font-family: 'KarmaticArcade';
            /* Assicurati che il file ka1.ttf sia nella cartella 'font/' rispetto a questo file HTML */
            src: url('font/ka1.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 2. APPLICAZIONE DEL FONT A TUTTI GLI ELEMENTI */
            font-family: 'KarmaticArcade', 'Courier New', Courier, monospace;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #5DD5F5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Evita sfocature su tutte le immagini pixel art */
        img {
            image-rendering: pixelated;
            display: block;
        }

        /* Sfondo animato */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            image-rendering: pixelated;
            animation: changeFrame 2s infinite steps(1);
        }

        @keyframes changeFrame {
            0%   { background-image: url('img/frame1.png'); }
            25%  { background-image: url('img/frame2.png'); }
            50%  { background-image: url('img/frame3.png'); }
            75%  { background-image: url('img/frame4.png'); }
            100% { background-image: url('img/frame1.png'); }
        }

        /* Stile per il terreno (Erba) */
        .floor {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            background-image: url('img/erba.png');
            background-size: 100% auto;
            background-repeat: no-repeat;
            background-position: bottom center;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            z-index: 1;
        }

        /* Menu container */
        .menu-container {
            position: fixed;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5vw;
            width: 100%;
            z-index: 10;
        }

        .btn img {
            width: 100%;
            min-width: 430px;
            image-rendering: pixelated;
            transition: transform 0.2s;
        }

        .btn-main img {
            width: 18vw;
            min-width: 400px;
        }

        .btn:hover img {
            transform: scale(1.1);
        }

        /* Tasto indietro */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            transition: transform 0.2s;
        }
        .back-button img {
            width: 80px;
            image-rendering: pixelated;
        }
        .back-button:hover {
            transform: scale(1.1);
        }

        .content-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
            color: white;
            text-shadow: 2px 2px #000;
            /* Il font è già ereditato da '*' */
        }
    </style>
</head>
<body>

    <div class="background-animation"></div>
    <div class="floor"></div>

    <main class="menu-container">
        <a href="instructions.html" class="btn btn-side">
            <img src="img/instruction.png" alt="Instructions">
        </a>

        <a href="play.html" class="btn btn-main">
            <img src="img/play.png" alt="Play">
        </a>

        <a href="rank.html" class="btn btn-side">
            <img src="img/rank.png" alt="Rank">
        </a>
    </main>

</body>
</html>

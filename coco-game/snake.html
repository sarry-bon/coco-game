<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pio Pio Party - Pixel Perfect</title>
    <style>
        @font-face {
            font-family: 'KarmaticArcade';
            src: url('font/ka1.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #96d949; 
            font-family: 'KarmaticArcade', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        #ui-container { 
            text-align: center; 
            margin-bottom: 10px; 
        }

        .score-box {
            font-size: 40px; 
            font-weight: bold;
            color: #7d13ff;
            text-shadow: 4px 4px 0px rgba(207, 255, 136, 0.892);
        }

        canvas {
            border: 6px solid #aa5d00;
            background-color: #c88126; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 0 50px rgba(170, 93, 0, 0.3);
        }

        .back-arrow {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 80px;
            image-rendering: pixelated;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 100;
        }
        .back-arrow:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-box">PULCINI: <span id="current-score">001</span></div>
    </div>

    <canvas id="snakeGame"></canvas>

    <a href="index.html">
        <img src="img/freccia.png" alt="Indietro" class="back-arrow">
    </a>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("current-score");

        const gridSize = 80; 
        let globalFrame = 0;

        const images = {};
        const sources = {
            pio1: 'img/pio1.png',
            pio2: 'img/pio2.png',
            pio3: 'img/pio3.png',
            mirtillo: 'img/mirtillo.png'
        };

        for (let key in sources) {
            images[key] = new Image();
            images[key].src = sources[key];
        }

        let snake, food, direction, nextDirection, lastTime, moveTimer;
        const moveInterval = 170; 

        function init() {
            canvas.width = Math.floor((window.innerWidth * 0.95) / gridSize) * gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.75) / gridSize) * gridSize;
            
            snake = [{x: 3 * gridSize, y: 3 * gridSize, dir: "RIGHT"}];
            food = getRandomFood();
            direction = "RIGHT";
            nextDirection = "RIGHT";
            lastTime = 0;
            moveTimer = 0;
            
            requestAnimationFrame(gameLoop);
        }

        function getRandomFood() {
            const cols = canvas.width / gridSize;
            const rows = canvas.height / gridSize;
            const allCells = [];
            for (let col = 0; col < cols; col++) {
                for (let row = 0; row < rows; row++) {
                    allCells.push({ x: col * gridSize, y: row * gridSize });
                }
            }
            const freeCells = allCells.filter(cell =>
                !snake.some(s => s.x === cell.x && s.y === cell.y)
            );
            if (freeCells.length === 0) return allCells[0]; // fallback se la griglia è piena
            return freeCells[Math.floor(Math.random() * freeCells.length)];
        }

        function salvaPunteggio(punteggioFinale) {
            const nomeGiocatore = localStorage.getItem("playerName") || "GUEST";
            const nuovoPunteggio = { 
                nome: nomeGiocatore.toUpperCase(), 
                punti: punteggioFinale 
            };

            let classifica = JSON.parse(localStorage.getItem("classifica_gioco_6")) || [];
            classifica.push(nuovoPunteggio);
            classifica.sort((a, b) => b.punti - a.punti);
            classifica = classifica.slice(0, 50);

            localStorage.setItem("classifica_gioco_6", JSON.stringify(classifica));
        }

        function drawEntity(img, x, y, dir, isMirtillo = false) {
            ctx.save();
            ctx.imageSmoothingEnabled = false;
            ctx.translate(x + gridSize / 2, y + gridSize / 2);

            if (!isMirtillo) {
                if (dir === "LEFT") ctx.scale(-1, 1);
                else if (dir === "UP") ctx.rotate(-Math.PI / 2);
                else if (dir === "DOWN") ctx.rotate(Math.PI / 2);
            }

            if (img && img.complete && img.naturalWidth > 0) {
                // MODIFICA: Il mirtillo ora è al 110% della dimensione della griglia
                const size = isMirtillo ? gridSize * 1.1 : gridSize;
                ctx.drawImage(img, -size/2, -size/2, size, size);
            } else {
                ctx.fillStyle = isMirtillo ? "#4444ff" : "#ffeb3b";
                ctx.fillRect(-gridSize/4, -gridSize/4, gridSize/2, gridSize/2);
            }
            ctx.restore();
        }

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            moveTimer += deltaTime;

            if (moveTimer >= moveInterval) {
                direction = nextDirection;
                const head = { x: snake[0].x, y: snake[0].y, dir: direction };

                if(direction === "LEFT") head.x -= gridSize;
                if(direction === "UP") head.y -= gridSize;
                if(direction === "RIGHT") head.x += gridSize;
                if(direction === "DOWN") head.y += gridSize;

                if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
                    snake.some(s => s.x === head.x && s.y === head.y)) {
                    
                    salvaPunteggio(snake.length);
                    alert("GAME OVER! Pulcini raccolti: " + snake.length);
                    location.reload();
                    return;
                }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    scoreElement.innerText = (snake.length).toString().padStart(3, '0');
                    food = getRandomFood();
                } else {
                    snake.pop();
                }
                
                globalFrame = (globalFrame + 1) % 3;
                moveTimer = 0;
            }

            ctx.fillStyle = "#d2b48c"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(0, 0, 0, 0.03)";
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            drawEntity(images.mirtillo, food.x, food.y, "RIGHT", true);

            snake.forEach((segment, i) => {
                let pioFrame = (globalFrame + i) % 3;
                let imgKey = "pio" + (pioFrame + 1);
                drawEntity(images[imgKey], segment.x, segment.y, segment.dir, false);
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if(["arrowup","arrowdown","arrowleft","arrowright"," "].includes(key)) {
                e.preventDefault();
            }

            if((key === "w" || key === "arrowup") && direction !== "DOWN") nextDirection = "UP";
            if((key === "s" || key === "arrowdown") && direction !== "UP") nextDirection = "DOWN";
            if((key === "a" || key === "arrowleft") && direction !== "RIGHT") nextDirection = "LEFT";
            if((key === "d" || key === "arrowright") && direction !== "LEFT") nextDirection = "RIGHT";
        });

        init();
    </script>
</body>
</html>

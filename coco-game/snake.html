<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stile-score.css"> 
    <style>
        @font-face {
            font-family: 'KarmaticArcade';
            src: url('font/ka1.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e0b36;
            font-family: 'KarmaticArcade', sans-serif;
        }

        body.page-snake {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        body.page-snake canvas {
            display: block;
            border: none !important;
            outline: none;
            box-shadow: none;
            width: 100vw;
            height: 100vh;
        }

        /* Schermata Trasparente Scura di Game Over */
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85); 
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(2px); 
        }

        /* Riquadro centrale */
        .game-over-box {
            background-color: #2c3e50;
            border: 6px solid #e74c3c;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 0 #000;
            max-width: 500px;
            width: 85%;
        }

        .game-over-box h2 {
            color: #e74c3c;
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin: 0 0 25px 0;
            text-shadow: 3px 3px #000;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Contenitore dei 3 pulsanti */
        .game-over-menu {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 20px;
        }

        /* Stile singoli pulsanti */
        .go-btn {
            background-color: #34495e;
            border: 4px solid #000;
            color: #fff;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 30%;
            transition: transform 0.1s;
            text-decoration: none;
            font-family: inherit;
        }

        .go-btn:active {
            transform: scale(0.95);
            background-color: #1a252f;
        }

        .go-btn img {
            width: 50px;
            height: 50px;
            image-rendering: pixelated; 
            margin-bottom: 8px;
            object-fit: contain;
        }

        .go-btn span {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            font-weight: bold;
            text-transform: uppercase;
        }

        .back-arrow {
            position: absolute;
            bottom: 30px;
            left: 40px;
            width: 45px;
            height: 45px;
            transition: transform 0.2s;
            opacity: 0.8;
            image-rendering: pixelated;
            z-index: 10;
        }
        .back-arrow:hover {
            transform: translateX(-5px);
            opacity: 1;
        }
    </style>
</head>
<body class="page-snake">

    <div id="ui-container">
        <div class="score-box">PULCINI: <span id="current-score">001</span></div>
    </div>

    <canvas id="snakeGame"></canvas>

    <div id="game-over-screen" class="game-over-overlay">
        <div class="game-over-box">
            <h2>GAME OVER</h2>
            <div class="game-over-menu">
                <a href="index.html" class="go-btn">
                    <img src="img/pio.3.png" alt="Home Icon">
                    <span>HOME</span>
                </a>
                <a href="rank.html" class="go-btn">
                    <img src="img/pio.2.png" alt="Rank Icon">
                    <span>RANK</span>
                </a>
                <div class="go-btn" onclick="resetGame()">
                    <img src="img/pio.1.png" alt="Replay Icon">
                    <span>REPLAY</span>
                </div>
            </div>
        </div>
    </div>

    <a href="play.html">
        <img src="img/freccia.png" alt="Indietro" class="back-arrow">
    </a>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("current-score");
        const gameOverScreen = document.getElementById("game-over-screen");

        // --- GESTIONE AUDIO ---
        const bgMusic = new Audio('audio/snake.mp3');
        bgMusic.loop = true; 

        const bipSound = new Audio('audio/bip.mp3');
        
        // Nuovi suoni di Game Over caricati insieme
        const gameOverSound1 = new Audio('audio/gameover1.mp3');
        const gameOverSound2 = new Audio('audio/gameover.mp3');
        // ----------------------

        let gridSize;
        let globalFrame = 0;
        let gameOver = false;
        let punteggioSalvato = false;

        const images = {};
        const sources = {
            pio1: 'img/pio1.png',
            pio2: 'img/pio2.png',
            pio3: 'img/pio3.png',
            mirtillo: 'img/mirtillo.png'
        };

        for (let key in sources) {
            images[key] = new Image();
            images[key].src = sources[key];
        }

        let snake, food, direction, nextDirection, lastTime, moveTimer;
        const moveInterval = 240; 

        function init() {
            const targetCols = Math.round(window.innerWidth / 80);
            const targetRows = Math.round(window.innerHeight / 80);
            
            gridSize = Math.floor(Math.min(
                window.innerWidth / targetCols,
                window.innerHeight / targetRows
            ));
            
            gridSize = Math.max(45, Math.min(gridSize, 70));

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const startX = Math.floor(canvas.width / 2 / gridSize) * gridSize;
            const startY = Math.floor(canvas.height / 2 / gridSize) * gridSize;

            snake = [{ x: startX, y: startY, dir: "RIGHT" }];
            direction = "RIGHT";
            nextDirection = "RIGHT";
            food = getRandomFood();
            
            lastTime = 0;
            moveTimer = 0;
            gameOver = false;
            punteggioSalvato = false;
            gameOverScreen.style.display = "none";
            scoreElement.innerText = "001";

            // Ferma i suoni di game over se si riavvia velocemente
            gameOverSound1.pause();
            gameOverSound1.currentTime = 0;
            gameOverSound2.pause();
            gameOverSound2.currentTime = 0;

            bgMusic.currentTime = 0;
            avviaMusica();
        }

        function avviaMusica() {
            bgMusic.play().catch(error => {
                console.log("Riproduzione automatica bloccata dal browser.");
            });
        }

        function getRandomFood() {
            const cols = Math.floor(canvas.width / gridSize);
            const rows = Math.floor(canvas.height / gridSize);
            
            let foodX, foodY;
            let isOnSnake;
            
            do {
                foodX = Math.floor(Math.random() * (cols - 1)) * gridSize;
                foodY = Math.floor(Math.random() * (rows - 1)) * gridSize;
                
                isOnSnake = snake.some(segment => segment.x === foodX && segment.y === foodY);
            } while (isOnSnake || foodX < 0 || foodY < 0);

            return { x: foodX, y: foodY };
        }

        function salvaPunteggio(punteggioFinale) {
            const nomeGiocatore = (localStorage.getItem("playerName") || "GUEST").toUpperCase();
            let classifica = JSON.parse(localStorage.getItem("classifica_gioco_6")) || [];
            const esistente = classifica.find(e => e.nome === nomeGiocatore);
            if (esistente) {
                if (punteggioFinale <= esistente.punti) return;
                esistente.punti = punteggioFinale;
            } else {
                classifica.push({ nome: nomeGiocatore, punti: punteggioFinale });
            }
            classifica.sort((a, b) => b.punti - a.punti);
            classifica = classifica.slice(0, 50);
            localStorage.setItem("classifica_gioco_6", JSON.stringify(classifica));
        }

        function drawEntity(img, x, y, dir, isMirtillo = false) {
            ctx.save();
            ctx.imageSmoothingEnabled = false;
            ctx.translate(x + gridSize / 2, y + gridSize / 2);

            if (!isMirtillo) {
                if (dir === "LEFT") ctx.scale(-1, 1);
                else if (dir === "UP") ctx.rotate(-Math.PI / 2);
                else if (dir === "DOWN") ctx.rotate(Math.PI / 2);
            }

            if (img && img.complete && img.naturalWidth > 0) {
                const size = isMirtillo ? gridSize * 1.1 : gridSize;
                ctx.drawImage(img, -size/2, -size/2, size, size);
            } else {
                ctx.fillStyle = isMirtillo ? "#ff00ff" : "#00ffff"; 
                ctx.fillRect(-gridSize/4, -gridSize/4, gridSize/2, gridSize/2);
            }
            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (!gameOver) {
                moveTimer += deltaTime;

                if (moveTimer >= moveInterval) {
                    direction = nextDirection;
                    const head = { x: snake[0].x, y: snake[0].y, dir: direction };

                    if(direction === "LEFT") head.x -= gridSize;
                    if(direction === "UP") head.y -= gridSize;
                    if(direction === "RIGHT") head.x += gridSize;
                    if(direction === "DOWN") head.y += gridSize;

                    if (head.x < 0 || head.x >= canvas.width || 
                        head.y < 0 || head.y >= canvas.height ||
                        snake.some((s, index) => index > 0 && s.x === head.x && s.y === head.y)) {

                        gameOver = true;
                        bgMusic.pause(); // Stoppa la musica di sottofondo
                        
                        // Riproduce i due suoni di game over sovrapposti
                        gameOverSound1.play().catch(e => console.log("Errore audio go1:", e));
                        gameOverSound2.play().catch(e => console.log("Errore audio go2:", e));

                        return requestAnimationFrame(gameLoop);
                    }

                    snake.unshift(head);
                    
                    if (head.x === food.x && head.y === food.y) {
                        scoreElement.innerText = (snake.length).toString().padStart(3, '0');
                        
                        bipSound.currentTime = 0;
                        bipSound.play().catch(e => console.log("Errore audio:", e));

                        food = getRandomFood();
                    } else {
                        snake.pop();
                    }

                    globalFrame = (globalFrame + 1) % 3;
                    moveTimer = 0;
                }
            }

            // Disegno del gioco
            ctx.fillStyle = "#1e0b36"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(153, 51, 255, 0.12)";
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            drawEntity(images.mirtillo, food.x, food.y, "RIGHT", true);

            snake.forEach((segment, i) => {
                let pioFrame = (globalFrame + i) % 3;
                let imgKey = "pio" + (pioFrame + 1);
                drawEntity(images[imgKey], segment.x, segment.y, segment.dir, false);
            });

            if (gameOver) {
                gameOverScreen.style.display = "flex";
                if (!punteggioSalvato) {
                    salvaPunteggio(snake.length);
                    punteggioSalvato = true;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            init();
        }

        window.addEventListener("keydown", (e) => {
            const key = e.code;

            avviaMusica();

            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(key)) {
                e.preventDefault();
            }

            if (gameOver) {
                if (key === "Space") {
                    resetGame();
                }
                return;
            }

            if ((key === "KeyW" || key === "ArrowUp") && direction !== "DOWN") {
                nextDirection = "UP";
            }
            if ((key === "KeyS" || key === "ArrowDown") && direction !== "UP") {
                nextDirection = "DOWN";
            }
            if ((key === "KeyA" || key === "ArrowLeft") && direction !== "RIGHT") {
                nextDirection = "LEFT";
            }
            if ((key === "KeyD" || key === "ArrowRight") && direction !== "LEFT") {
                nextDirection = "RIGHT";
            }
        });

        window.addEventListener("mousedown", (e) => {
            avviaMusica();

            if (gameOver) {
                if (gameOverScreen.contains(e.target)) {
                    return; 
                }
                resetGame();
            }
        });

        window.addEventListener("resize", () => {
            init();
        });

        init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
